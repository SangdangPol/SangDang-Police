<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>청주상당경찰서 스마트 치안센터</title>
    
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="icon" type="image/png" href="logo.png">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a237e">

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-MPW04QS7GN"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-MPW04QS7GN', { 'page_title': '종합 메인 포털' });
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f3f4f6; -webkit-tap-highlight-color: transparent;}
        .bg-police-dark { background-color: #1a237e; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 bg-gray-200">

    <div id="toastMessage" class="fixed top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-gray-800/95 text-white px-6 py-4 rounded-2xl font-bold text-sm z-[200] hidden opacity-0 transition-opacity duration-300 text-center shadow-2xl leading-relaxed whitespace-pre-wrap w-11/12 max-w-xs">
    </div>

    <div class="w-full max-w-md bg-white rounded-2xl shadow-2xl overflow-hidden relative pb-16">
        <div class="bg-police-dark p-6 text-center relative shadow-inner">
            <div class="absolute top-4 right-4 z-10 flex flex-col gap-1.5 items-end">
                <button onclick="triggerPwaInstall()" class="text-police-dark bg-yellow-400 hover:bg-yellow-300 text-xs rounded px-3 py-1.5 font-black transition flex items-center gap-1.5 shadow-md active:scale-95">
                    <i class="fa-solid fa-download"></i> 앱 설치
                </button>
            </div>
            <img src="logo.png" onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/thumb/3/30/Emblem_of_the_Korean_National_Police_Agency.svg/150px-Emblem_of_the_Korean_National_Police_Agency.svg.png'" class="w-20 h-20 mx-auto mb-3 object-contain bg-white rounded-full p-1 shadow-md">
            <h1 class="text-2xl font-black text-white mb-1 tracking-tight">청주상당경찰서</h1>
            <p class="text-blue-200 text-sm font-medium tracking-tight">범죄예방대응과 스마트 치안센터</p>
        </div>

        <div class="p-6 space-y-4">
            <!-- 기존 서비스 메뉴 영역은 동일하게 유지 -->
        </div>

        <!-- [수정] 강제 노출형 하단 설치 바 -->
        <div id="install-banner" class="hidden absolute bottom-0 left-0 right-0 bg-police-dark text-white p-3.5 flex items-center justify-between z-30 shadow-[0_-10px_20px_rgba(0,0,0,0.15)] animate-bounce border-t border-white/10 rounded-b-2xl">
            <div class="flex items-center gap-2.5 text-left">
                <i class="fa-solid fa-mobile-screen-button text-xl text-yellow-300"></i>
                <div class="flex flex-col">
                    <span class="text-xs font-black tracking-tight">원클릭 홈 화면 바로가기 추가</span>
                    <span class="text-[10px] text-gray-300 font-medium">검색 없이 앱처럼 즉시 접속하세요</span>
                </div>
            </div>
            <button onclick="triggerPwaInstall()" class="bg-yellow-400 hover:bg-yellow-300 text-slate-900 text-[11px] font-black py-2 px-3.5 rounded-lg shadow-sm transition active:scale-95">
                📲 설치
            </button>
        </div>
    </div>

    <script>
        let deferredPrompt;
        const installBanner = document.getElementById('install-banner');

        // 설치 여부 판단 로직
        const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;

        // [핵심 수정] 브라우저 상관없이 페이지 로드 시 즉시 배너 표시 (앱 상태가 아닐 때)
        window.addEventListener('load', () => {
            if (!isStandalone) {
                installBanner.classList.remove('hidden');
            }
        });

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
        });

        function triggerPwaInstall() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then((choiceResult) => {
                    if (choiceResult.outcome === 'accepted') installBanner.classList.add('hidden');
                    deferredPrompt = null;
                });
            } else {
                // 이벤트가 없는 경우(삼성 브라우저 등) 수동 가이드 팝업 실행
                alert('브라우저 설정 메뉴(점 3개)에서 "홈 화면에 추가"를 눌러주세요.');
            }
        }
    </script>
</body>
</html>
